<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cakery Cafe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="container" style="justify-content: flex-end;">
            <a href="#" class="back-btn">
                <span>AR</span>
            </a>
        </div>
    </nav>

    <div class="hero fade-in">
        <img class="hero-logo" src="logo-cakery.png" alt="Cakery Cafe Logo">
    </div>

    <div class="container fade-in" style="animation-delay: 0.2s;">
        <div class="branches-list">
            <a href="branch1.html" class="branch-card">
                <img src="assets/site/village-branch.jpg" alt="The Village">
                <div class="branch-info">
                    <h3>The Village</h3>
                    <p>Cafe & Bakery</p>
                </div>
                <div class="branch-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </div>
            </a>

            <a href="branch2.html" class="branch-card">
                <img src="assets/site/mall-of-oman-branch.jpg" alt="Mall of Oman">
                <div class="branch-info">
                    <h3>Mall of Oman</h3>
                    <p>Boutique Cafe</p>
                </div>
                <div class="branch-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </div>
            </a>
        </div>
    </div>

    <div class="footer-bg fade-in" style="position: fixed; bottom: 0; left: 0; right: 0; z-index: -1; line-height: 0; pointer-events: none;">
        <img src="assets/site/home%20page.png" alt="Footer Background" style="width: 100%; max-height: 40vh; object-fit: cover; object-position: bottom; filter: blur(4px); -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%); mask-image: linear-gradient(to bottom, transparent 0%, black 40%); opacity: 0.6;">
    </div>

</body>
</html>
